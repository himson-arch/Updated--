        }

            padding: 8px 20px;

        }

        }

        }

        }
        .nav-btn {

            height: 44px;

        .nav-btn:hover {

            color: white;
        }
        .today-btn {

            border: none;

            font-weight: 600;

            margin-bottom: 30px;
        }
        .card {
            background: white;

            <button class="nav-btn" id="prevDay"><i class="fas fa-chevron-left"></i></button>

        </div>

        <button class="save-btn" id="saveBtn"><i class="fas fa-save"></i> 儲存修改</button>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-title"><i class="fas fa-truck"></i> 車隊狀態 · <span id="fleetDateLabel"></span></div>

        </div>
        <div class="card">

                </div>

                </div>
                <p id="savedDistance" style="margin-top:15px;">節省 0 km</p>
            </div>
            <div class="compare-card">

            </div>
        </div>
    </div>

                        <div class="route-progress"><div class="progress-fill" style="width:${item.progress}%;"></div></div>
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                            <span>已跑 <span class="editable" data-type="fleet" data-field="dist" data-plate="${item.plate}">${item.dist}</span> km</span>
                            <span>尚餘 <span class="editable" data-type="fleet" data-field="remain" data-plate="${item.plate}">${item.remain}</span> 站</span>
                        </div>
                    </div>
                </div>
            `;
        });
        if (data.fleet.length === 0) fleetHtml = '<p style="color:#999;">當日無車隊任務</p>';
        fleetContainer.innerHTML = fleetHtml;

        // 街站
        let stationHtml = '';
        data.stations.forEach((s, idx) => {
            stationHtml += `
                <div class="station-item">
                    <span><span class="status-dot ${s.status}"></span><span class="editable" data-type="station" data-index="${idx}" data-field="name">${s.name}</span></span>
                    <span class="station-time editable" data-type="station" data-index="${idx}" data-field="time">${s.time}</span>
                </div>
            `;
        });
        if (data.stations.length === 0) stationHtml = '<p style="color:#999;">當日無街站</p>';
        stationContainer.innerHTML = stationHtml;

        // 司機
        let crewHtml = '';
        data.crew.forEach((c, idx) => {
            crewHtml += `<tr>
                <td><span class="editable" data-type="crew" data-index="${idx}" data-field="plate">${c.plate}</span></td>
                <td><span class="editable" data-type="crew" data-index="${idx}" data-field="name">${c.name}</span></td>
                <td><span class="editable" data-type="crew" data-index="${idx}" data-field="shift">${c.shift}</span></td>
                <td><span class="shift-badge editable" data-type="crew" data-index="${idx}" data-field="status">${c.status}</span></td>
            </tr>`;
        });
        if (data.crew.length === 0) crewHtml = '<tr><td colspan="4">無資料</td></tr>';
        crewBody.innerHTML = crewHtml;

        // 優化面板
        const stationCount = data.stations.length;
        stationCountText.innerText = `根據 ${stationCount} 個站點 · ${currentDate}`;
        const baseDist = stationCount * 12 + 20;
        const optDist = Math.round(baseDist * 0.82);
        const saved = baseDist - optDist;
        const percent = stationCount ? Math.round((saved / baseDist) * 100) : 0;
        manualDist.innerText = baseDist + ' km';
        aiDist.innerText = optDist + ' km';
        savedDistance.innerText = `節省 ${saved} km (${percent}%)`;
        efficiencyBar.style.width = stationCount ? (optDist / baseDist * 100) + '%' : '0%';
        savingsPercent.innerText = stationCount ? `節省 ${percent}%` : '0%';

        let routeHtml = '';
        data.stations.slice(0,6).forEach(s => {
            routeHtml += `<li><i class="fas fa-arrow-right" style="color:#1f7b3c;"></i> ${s.name} (${s.time})</li>`;
        });
        if (data.stations.length > 6) routeHtml += `<li>...... 等 ${data.stations.length} 個站點</li>`;
        routeList.innerHTML = routeHtml || '<li>無路線資料</li>';
    }

    function saveEdits() {
        const data = dailyData[currentDate];
        if (!data) return;
        document.querySelectorAll('[data-type="fleet"]').forEach(el => {
            const plate = el.dataset.plate;
            const field = el.dataset.field;
            const fleetItem = data.fleet.find(f => f.plate === plate);
            if (fleetItem) {
                if (field === 'desc') fleetItem.desc = el.innerText;
                else if (field === 'dist') fleetItem.dist = parseInt(el.innerText) || 0;
                else if (field === 'remain') fleetItem.remain = parseInt(el.innerText) || 0;
            }
        });
        document.querySelectorAll('[data-type="station"]').forEach(el => {
            const idx = el.dataset.index;
            const field = el.dataset.field;
            if (data.stations[idx]) data.stations[idx][field] = el.innerText;
        });
        document.querySelectorAll('[data-type="crew"]').forEach(el => {
            const idx = el.dataset.index;
            const field = el.dataset.field;
            if (data.crew[idx]) data.crew[idx][field] = el.innerText;
        });
        alert('修改已儲存！');
    }

    function changeDate(offset) {
        let d = new Date(currentDate + 'T12:00:00');
        d.setDate(d.getDate() + offset);
        const year = d.getFullYear();
        const month = String(d.getMonth()+1).padStart(2,'0');
        const day = String(d.getDate()).padStart(2,'0');
        currentDate = `${year}-${month}-${day}`;
        if (!dailyData[currentDate]) currentDate = '2026-03-07';
        datePicker.value = currentDate;
        renderDate();
    }

    window.onload = function() {
        datePicker.value = currentDate;
        renderDate();

        document.getElementById('prevDay').addEventListener('click', () => changeDate(-1));
        document.getElementById('nextDay').addEventListener('click', () => changeDate(1));
        document.getElementById('todayBtn').addEventListener('click', () => {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth()+1).padStart(2,'0');
            const d = String(today.getDate()).padStart(2,'0');
            currentDate = `${y}-${m}-${d}`;
            if (!dailyData[currentDate]) currentDate = '2026-03-07';
            datePicker.value = currentDate;
            renderDate();
        });
        datePicker.addEventListener('change', function(e) {
            currentDate = e.target.value;
            if (!dailyData[currentDate]) {
                alert('所選日期無數據，將顯示3月7日');
                currentDate = '2026-03-07';
                datePicker.value = currentDate;
            }
            renderDate();
        });
        document.getElementById('optimizeBtn').addEventListener('click', renderDate);
        document.getElementById('saveBtn').addEventListener('click', saveEdits);
    };
})();
</script>
</body>
</html>
